version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      # Mount the application code to enable hot reloading during local development
      - ./app:/app/app
      # Mount data directories to use local datasets and models
      - ./data:/app/data
      # Mount artifacts to persist any local outputs
      - ./artifacts:/app/artifacts
    # Override the default CMD to enable auto-reload for local development
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
